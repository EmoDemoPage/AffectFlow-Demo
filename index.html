<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8" />

<title>AffectFlow Demo</title>

<link href="css/styles.css" rel="stylesheet" />
<link rel="stylesheet" href="css/heading.css" />
<link rel="stylesheet" href="css/body.css" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/js/all.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

<style>

.sample-card{
background:white;
border-radius:18px;
padding:30px;
margin-bottom:45px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
border:1px solid #e8e8e8;
}

/* script box */
.script-box{
background:#f5f5f5;
padding:20px;
border-radius:10px;
margin-bottom:25px;
font-size:15px;
}

/* audio inside script */

.script-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.script-title{
font-weight:700;
}

.script-audio{
text-align:right;
}

.script-content{
white-space:pre-line;
}

/* category divider */

.category-divider{
display:flex;
align-items:center;
text-align:center;
margin:35px 0 15px 0;
font-weight:600;
color:#444;
}

.category-divider::before,
.category-divider::after{
content:'';
flex:1;
border-bottom:1px solid #ddd;
}

.category-divider::before{ margin-right:15px }
.category-divider::after{ margin-left:15px }

/* CSS model layout */

.model-grid{
display:grid;
grid-template-columns:repeat(2,180px);
justify-content:center;
column-gap:300px;
max-width:650px;
margin:0 auto;
margin-left:120px;
}

.model-single{
display:flex;
justify-content:center;
margin-left:-120px;
}

/* Ablation grid */

.model-grid-3{
display:grid;
grid-template-columns:repeat(3,180px);
column-gap:180px;
max-width:650px;
margin:0 auto;
justify-items:left;
margin-left:-5px;
}

.model-box{
text-align:left;
padding:10px;
width:180px;
}

.ours{
color:#1b7f3c;
font-weight:700;
}

.script-layout{
display:grid;
grid-template-columns: 1fr 260px;
gap:20px;
align-items:start;
}

.script-text{
line-height:1.5;
}

.script-audio-player{
min-width:220px;
display:flex;
flex-direction:column;
align-items:center;
}

.script-audio-label{
font-weight:600;
font-size:13px;
margin-bottom:6px;
text-align:center;
color:#333;
}

.header-links {
  margin-top: 12px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.header-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.15);
  background: #fff;
  color: #111;
  text-decoration: none;
  font-weight: 600;
}

.header-link-btn:hover {
  border-color: rgba(0,0,0,0.35);
  text-decoration: none;
}

</style>

<script>

const audioList=[
"5_1_d2442",
"6_1_d1583",
"4_1_d1248",
"4_1_d808",
"9_1_d2531",
"5_1_d312"
];

const scripts={
"6_1_d1583":{
script:`<b>Previous Turn</b>
A: Brown, please.<br>
B: Here are some nice brown hats. Try this hat on. It's a very good one.<br>

<br>

<b>Current Turn</b><br>
<br>
A: Yes, I like this one. It goes very well with my coat. How much is it?`
},

"5_1_d2442":{
script:`<b>Previous Turn</b>
A: Fine, thank you, and you?<br>
B: Pretty good. What brings you here?<br>

<br>

<b>Current Turn</b><br>
<br>
A: I came to see my uncle. He lives in the next block.`
},

"11_1_d2531":{
script:`<b>Previous Turn</b>
A: It's great! I've learned a lot from reading it.<br>
B: Can I read it when you're done?<br>

<br>

<b>Current Turn</b><br>
<br>
A: Sure, Bob! I'm on chapter twelve now, so I'm almost finished.`
},

"10_1_d1958":{
script:`<b>Previous Turn</b>
A: Which direction were you coming from?<br>
B: Just straight.<br>

<br>

<b>Current Turn</b><br>
<br>
A: Please move your vehicle off to the side of the road.`
},

"7_0_d255":{
script:`<b>Previous Turn</b>
A: Umm, I don't believe it.<br>
B: But you know that smoking does harm to health, right?<br>

<br>

<b>Current Turn</b><br>
<br>
A: Of course I know it, but you know it's hard to quit smoking...`
},

"4_1_d1248":{
script:`<b>Previous Turn</b>
A: A denim shirt and one of Serena Williams' used tennis rackets!<br>
B: Your idol! Wow! You're even better at finding stuff than me!<br>

<br>

<b>Current Turn</b><br>
<br>
A: Yep. I placed a bid for the shirt. The minimum was ten so i bet fifty!`
},

"9_1_d2531":{
script:`<b>Previous Turn</b>
A: It was written by Howard Sounds.<br>
B: Umm, what do you think about it?<br>

<br>

<b>Current Turn</b><br>
<br>
A: It's great! I've learned a lot from reading it.`
},

"4_1_d808":{
script:`<b>Previous Turn</b>
A: What's the matter?<br>
B: Umm, the food station was as crowded as usual.<br>

<br>

<b>Current Turn</b><br>
<br>
A: I see. You simply can't blame the server for this.`
},

"6_0_d303":{
script:`<b>Previous Turn</b>
A: Just about. There are at least a few hundred.<br>
B: How many days will the reunion be?<br>

<br>

<b>Current Turn</b><br>
<br>
A: Usually it's at least five days and four nights.`
},

"5_1_d312":{
script:`<b>Previous Turn</b>
A: A garage sale... That's where people check out cars, right?<br>
B: What? Cars? Umm, are you serious?<br>

<br>

<b>Current Turn</b><br>
<br>
A: I'm pulling your leg, Paul. I'm a shopping queen, remember? So of course i know what a garage sale is all about!`
}
};

const cssModels={

"Reference Speech":{
"Ground Truth":"GT",
"Vocoded":"Vocoded"
},

"Context-Aware Modeling":{
"BaseCSS":"BaseCSS",
"FCTalker":"FCTalker"
},

"Emotion-Aware Modeling":{
"ECSS":"ECSS",
"JELLY":"JELLY"
},

"Affective Flow Modeling":{
"AffectFlow (Ours)":"AffectFlow"
}

};

const ablationModels={
"Embedding-based":"Ablation_Embedding",
"GRU":"Ablation_GRU",
"GRU-DialogueRNN":"Ablation_DialogueRNN",
"Affective Flow (Ours)":"AffectFlow"
};

function createCSSSample(audio){

let html=`<div class="sample-card">`

html+=`
<div class="script-box">

<div class="script-header">

<div class="script-title">
Previous Turn
</div>

</div>

<div class="script-layout">

<div class="script-text">
${scripts[audio].script.replace('<b>Previous Turn</b>','')}
</div>

<div class="script-audio-player">

<div class="script-audio-label">
Previous Turn Speech
</div>

<audio controls>
<source src="./wavs/ref/${audio}.wav">
</audio>

</div>

</div>

</div>
`

for(let category in cssModels){

html+=`<div class="category-divider">${category}</div>`

let models=cssModels[category]
let count=Object.keys(models).length

if(count==1){
html+=`<div class="model-single">`
}else{
html+=`<div class="model-grid">`
}

for(let model in models){

let cls=model.includes("Ours")?"ours":""

html+=`
<div class="model-box">
<div class="${cls}">${model}</div>
<audio controls>
<source src="./wavs/${models[model]}/${audio}.wav">
</audio>
</div>
`
}

html+=`</div>`
}

html+=`</div>`

return html
}

function createAblationSample(audio){

let html=`<div class="sample-card">`

html+=`
<div class="script-box">

<div class="script-header">

<div class="script-title">
Previous Turn
</div>

</div>

<div class="script-layout">

<div class="script-text">
${scripts[audio].script.replace('<b>Previous Turn</b>','')}
</div>

<div class="script-audio-player">

<div class="script-audio-label">
Previous Turn Speech
</div>

<audio controls>
<source src="./wavs/ref/${audio}.wav">
</audio>

</div>

</div>

</div>
`

html+=`<div class="model-grid-3">`

for(let model in ablationModels){

let cls=model.includes("Ours")?"ours":""

html+=`
<div class="model-box">
<div class="${cls}">${model}</div>
<audio controls>
<source src="./wavs/${ablationModels[model]}/${audio}.wav">
</audio>
</div>
`
}

html+=`</div></div>`

return html
}

function buildPage(){

let cssHTML=""
audioList.forEach(a=>{
cssHTML+=createCSSSample(a)
})
document.getElementById("css_samples").innerHTML=cssHTML

let ablHTML=""
audioList.forEach(a=>{
ablHTML+=createAblationSample(a)
})
document.getElementById("ablation_samples").innerHTML=ablHTML

}

</script>
